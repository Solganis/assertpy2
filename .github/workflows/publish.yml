name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.15"
          allow-prereleases: true

      - name: Build
        run: uv build

      - name: Attest wheel
        id: attest-wheel
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*.whl

      - name: Attest sdist
        id: attest-sdist
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*.tar.gz

      - name: Prepare provenance bundles
        run: |
          mkdir -p provenance
          cp "$WHEEL_BUNDLE" "provenance/$(basename dist/*.whl).sigstore.json"
          cp "$SDIST_BUNDLE" "provenance/$(basename dist/*.tar.gz).sigstore.json"
        env:
          WHEEL_BUNDLE: ${{ steps.attest-wheel.outputs.bundle-path }}
          SDIST_BUNDLE: ${{ steps.attest-sdist.outputs.bundle-path }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

      - name: Upload to GitHub Release
        run: gh release upload "$TAG_NAME" dist/* provenance/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name }}
